<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith — A Futuristic Radial Dock for macOS</title>
    <meta name="description" content="Zenith is a next-generation radial dock with cyberpunk aesthetics. High-performance, stencil mode, and stunning visual effects.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <!-- The Trigger Bar (Simulated) -->
        <header id="zenith-trigger-bar">
            <div class="notch-zone"></div>
        </header>

        <main>
            <section id="hero">
                <div class="container">
                    <h1 class="fades-in">Zenith</h1>
                    <p class="tagline fades-in">A FUTURISTIC RADIAL DOCK FOR macOS</p>
                    <div class="cta-buttons fades-in">
                        <a href="https://github.com/zenith/zenith" class="btn btn-primary">Download v1.0</a>
                        <a href="#features" class="btn btn-secondary">Explore Features</a>
                    </div>
                </div>
            </section>

            <!-- Radial Dock Simulation Container -->
            <section id="simulation-area">
                <div class="dock-container">
                    <div id="radial-dock" class="hidden">
                        <!-- Icons will be injected or placed here -->
                        <div class="dock-icon" data-label="Applications">🚀</div>
                        <div class="dock-icon" data-label="Settings">⚙️</div>
                        <div class="dock-icon" data-label="Browser">🌐</div>
                        <div class="dock-icon" data-label="Music">🎵</div>
                        <div class="dock-icon" data-label="Files">📁</div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 Zenith. Made for macOS.</p>
        </footer>
    </div>
    <script type="module" src="/main.js"></script>
</body>
</html>
